<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد تحويل PalPay</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url('https://postimg.cc'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        /* طبقة التعتيم والخلفية */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* شعار شارع الشعف */
        .welcome-header {
            color: white;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            text-align: center;
            background: rgba(94, 45, 137, 0.7);
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px solid white;
        }

        .card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 85%; 
            max-width: 380px; 
            text-align: center;
        }

        h2 { color: #5e2d89; margin-bottom: 20px; font-size: 22px; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 1px solid #ccc; border-radius: 12px; 
            box-sizing: border-box; font-size: 16px; text-align: center;
        }

        button { 
            width: 100%; padding: 15px; 
            background-color: #5e2d89; color: white; 
            border: none; border-radius: 12px; 
            font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        .note { 
            font-size: 13px; color: #444; margin-top: 15px; 
            background: #f0ebf5; padding: 10px; border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- الشعار الجديد -->
    <div class="welcome-header">
        شارع الشعف يرحب بكم
    </div>

    <div class="card">
        <h2>مساعد تحويل PalPay</h2>
        
        <input type="number" id="phone" placeholder="رقم الجوال المستلم">
        <input type="number" id="amount" placeholder="المبلغ">
        
        <button onclick="makeCall()">تجهيز الكود والاتصال</button>
        
        <div class="note">
            اضغط اتصال، ثم أدخل رقمك السري (4 أرقام).
        </div>
    </div>

<script>
    function makeCall() {
        const phone = document.getElementById('phone').value;
        const amount = document.getElementById('amount').value;
        
        if (!phone || !amount) {
            alert("يرجى إدخال البيانات كاملة");
            return;
        }

        const ussd = `*370*1*1*${phone}*${amount}%23`;
        window.location.href = "tel:" + ussd;
    }
</script>

</body>
</html>
